name: Build Installable Plugin ZIP

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build ZIP with WordPress.org plugin slug
        run: |
          mkdir -p build/alpha-price-table-for-elementor
          rsync -a ./ build/alpha-price-table-for-elementor/ \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='build' \
            --exclude='vendor' \
            --exclude='node_modules' \
            --exclude='composer.json' \
            --exclude='composer.lock' \
            --exclude='phpcs.xml.dist'
          cd build
          zip -qr alpha-price-table-for-elementor.zip alpha-price-table-for-elementor

      - name: Upload installable ZIP
        uses: actions/upload-artifact@v4
        with:
          name: alpha-price-table-for-elementor
          path: build/alpha-price-table-for-elementor.zip
